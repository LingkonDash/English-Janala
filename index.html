<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- Author Details -->
  <meta name="author" content="LINGKON DASH">
  <meta name="description" content="English Vocabularies">

  <title>English Janala</title>

  <!-- DaisyUI and Tailwind-CSS -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Custom Css -->
  <link rel="stylesheet" href="style.css">

  <style type="text/tailwindcss">
    @theme {
      --color-primary-text: #18181B;
      --color-secondary-text: #62748E;

      --color-navbar-bg: rgba(186, 222, 255, 0.26);
    }
    </style>

</head>

<body>
  <header class="bg-navbar-bg border-b border-b-[#C6BDBD]">
    <nav class="relative max-w-[1500px] mx-auto flex justify-between items-center py-5 px-10">
      <div class="flex justify-center items-center gap-2">
        <h1 class="font-semibold text-2xl text-primary-text">English</h1>
        <img src="assets/logo.png" alt="Logo">
        <h1 class="font-semibold font-shiliguri text-2xl text-primary-text">জানালা</h1>
      </div>

      <ul class="hidden md:flex justify-center items-center gap-3">
        <li><button class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</button></li>
        <li><button class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i> Learn</button></li>
        <li><button class="btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i>
            LogOut</button></li>
      </ul>

      <ul id="dropDown-menu"
        class="absolute top-full w-1/2 border border-t-transparent border-r-transparent text-center rounded-bl-xl border-[#C6BDBD] bg-white right-0 px-10 pb-10 pt-5 space-y-5 hidden">
        <li><button class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</button></li>
        <li><button class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i> Learn</button></li>
        <li><button class="btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i>
            LogOut</button></li>
      </ul>

      <button onclick="dorpDownMenu()" class="cursor-pointer text-2xl md:hidden"><i
          class="fa-solid fa-bars"></i></button>
    </nav>
  </header>
  <main class="max-w-[1500px] mx-auto">
    <section
      class="flex flex-col-reverse md:flex-row text-center md:text-start justify-between items-center p-10 text-primary-text">
      <div class="flex-1 space-y-6">
        <h1 class="font-bold text-4xl"><span class="text-[#00BCFF]">English</span> is Easy!!</h1>
        <p class="font-medium text-2xl font-shiliguri">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive
          Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>

        <div class="mx-auto md:m-0 card bg-base-100 w-full max-w-sm shrink-0">
          <div class="card-body">
            <fieldset class="fieldset">
              <label class="label">Email</label>
              <input type="email" class="input" placeholder="Email" />
              <label class="label">Password</label>
              <input type="password" class="input" placeholder="Password" />
              <button class="btn btn-primary w-[150px] mt-4">Get Started</button>
            </fieldset>
          </div>
        </div>
      </div>
      <div class="flex-1">
        <img src="assets/hero-student.png" alt="hero banner">
      </div>
    </section>
  </main>
  <script src="main.js"></script>
</body>

</html>
